<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SU Navigate — Silliman University Campus Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<!-- ═══════════════════════════════════════════════
     LEAFLET.JS  —  FREE, NO API KEY NEEDED
     Loaded from cdnjs (a public CDN, always free)
     ═══════════════════════════════════════════════ -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  /* ════════════════════════════════
     DESIGN TOKENS  (Silliman brand)
     ════════════════════════════════ */
  :root {
    --su-green:       #1B4D2E;
    --su-green-light: #2E7D4F;
    --su-green-pale:  #EAF3EE;
    --su-gold:        #C8922A;
    --su-gold-light:  #FDF3E3;
    --white:          #FFFFFF;
    --gray-50:        #F8F9FA;
    --gray-100:       #F1F3F5;
    --gray-200:       #E9ECEF;
    --gray-300:       #DEE2E6;
    --gray-500:       #ADB5BD;
    --gray-600:       #6C757D;
    --gray-700:       #495057;
    --gray-900:       #212529;
    --shadow-sm:  0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:  0 4px 12px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.06);
    --shadow-lg:  0 8px 24px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
    --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 24px;
    --panel-w: 360px;
    /* Mobile safe areas */
    --nav-h: 64px;
    --topbar-h: 64px;
  }

  *, *::before, *::after {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gray-100);
    height: 100vh; height: 100dvh;
    overflow: hidden;
    color: var(--gray-900);
    /* Prevent font scaling on iOS rotation */
    -webkit-text-size-adjust: 100%;
  }

  /* ══════════ MAP ══════════ */
  #map-container { position: absolute; inset: 0; }
  #map { width: 100%; height: 100%; }
  .leaflet-popup-content-wrapper { display: none; }

  /* ══════════ TOP BAR ══════════ */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 12px 12px 0;
    display: flex; gap: 8px; align-items: center;
    pointer-events: none;
  }
  #topbar > * { pointer-events: all; }

  #logo-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--su-green); color: white;
    padding: 10px 14px;
    border-radius: var(--r-md);
    box-shadow: var(--shadow-md);
    white-space: nowrap; flex-shrink: 0;
    min-height: 44px; /* Touch target */
  }
  #logo-pill svg { width: 18px; height: 18px; flex-shrink: 0; }
  #logo-pill span { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; letter-spacing: .01em; }
  #logo-pill small { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 300; opacity: .75; display: block; margin-top: 1px; }

  #search-bar { flex: 1; position: relative; min-width: 0; }
  #search-input {
    width: 100%; padding: 11px 44px 11px 42px;
    border: none; border-radius: var(--r-md);
    font-size: 16px; /* 16px prevents iOS auto-zoom */
    font-family: 'DM Sans', sans-serif;
    background: white; box-shadow: var(--shadow-md);
    outline: none; color: var(--gray-900);
    min-height: 44px; /* Touch target */
    -webkit-appearance: none;
  }
  #search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--su-green); pointer-events: none; }
  #search-clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--gray-500); padding: 8px; display: none;
    border-radius: 50%; transition: background .15s;
    min-width: 36px; min-height: 36px;
    display: none; align-items: center; justify-content: center;
  }
  #search-clear:hover { background: var(--gray-100); }

  #search-results {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: white; border-radius: var(--r-md);
    box-shadow: var(--shadow-lg); overflow: hidden;
    display: none; max-height: 60vmax; overflow-y: auto; z-index: 200;
  }
  .search-result-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; cursor: pointer;
    transition: background .15s; border-bottom: 1px solid var(--gray-100);
    min-height: 52px; /* Comfortable touch target */
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:active { background: var(--su-green-pale); }
  @media (hover: hover) { .search-result-item:hover { background: var(--su-green-pale); } }
  .result-icon { width: 36px; height: 36px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  .result-info { flex: 1; min-width: 0; }
  .result-name { font-size: 14px; font-weight: 500; color: var(--gray-900); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-type { font-size: 12px; color: var(--gray-600); margin-top: 2px; }

  /* ══════════ SIDE PANEL (Desktop) ══════════ */
  #side-panel {
    position: absolute; left: 12px; top: 78px; bottom: 12px;
    width: var(--panel-w); z-index: 900;
    display: flex; flex-direction: column; gap: 10px;
    overflow-y: auto; pointer-events: none;
  }
  #side-panel > * { pointer-events: all; }

  .panel-card { background: white; border-radius: var(--r-lg); box-shadow: var(--shadow-md); overflow: hidden; }

  #category-scroll { padding: 12px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  #category-scroll::-webkit-scrollbar { display: none; }

  .chip {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 100px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    white-space: nowrap; border: 1.5px solid var(--gray-200);
    background: white; color: var(--gray-700);
    transition: all .15s; font-family: 'DM Sans', sans-serif;
    min-height: 38px; /* Touch-friendly */
  }
  .chip:active { border-color: var(--su-green); color: var(--su-green); }
  @media (hover: hover) { .chip:hover { border-color: var(--su-green); color: var(--su-green); } }
  .chip.active { background: var(--su-green); border-color: var(--su-green); color: white; }
  .chip-icon { font-size: 14px; }

  #locations-panel { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  #locations-header { padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--gray-100); }
  #locations-header h2 { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--su-green); font-weight: 600; }
  #location-count { font-size: 11px; color: var(--gray-500); }
  #locations-list { overflow-y: auto; flex: 1; }

  .location-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer;
    transition: background .15s; border-bottom: 1px solid var(--gray-50);
    min-height: 56px;
  }
  .location-item:active { background: var(--su-green-pale); }
  @media (hover: hover) { .location-item:hover { background: var(--su-green-pale); } }
  .location-item.active { background: var(--su-green-pale); border-left: 3px solid var(--su-green); }
  .loc-icon { width: 40px; height: 40px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .loc-info { flex: 1; min-width: 0; }
  .loc-name { font-size: 13px; font-weight: 500; color: var(--gray-900); }
  .loc-desc { font-size: 11px; color: var(--gray-600); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .loc-go-btn {
    width: 36px; height: 36px; background: var(--su-green-pale); border: none;
    border-radius: var(--r-sm); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .15s;
  }
  .loc-go-btn:active { background: var(--su-green); }
  .loc-go-btn:active svg { stroke: white; }
  @media (hover: hover) {
    .loc-go-btn:hover { background: var(--su-green); }
    .loc-go-btn:hover svg { stroke: white; }
  }
  .loc-go-btn svg { stroke: var(--su-green); }

  /* ══════════ DETAIL PANEL ══════════ */
  #detail-panel {
    position: absolute; left: 12px; bottom: 12px;
    width: var(--panel-w); z-index: 950;
    background: white; border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg); overflow: hidden;
    display: none; transform: translateY(20px); opacity: 0;
    transition: transform .25s ease, opacity .25s ease;
  }
  #detail-panel.visible { display: block; transform: translateY(0); opacity: 1; }
  .detail-header { background: var(--su-green); padding: 16px; color: white; display: flex; align-items: flex-start; gap: 12px; }
  .detail-icon { font-size: 28px; line-height: 1; flex-shrink: 0; }
  .detail-title-wrap { flex: 1; min-width: 0; }
  .detail-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; line-height: 1.3; }
  .detail-subtitle { font-size: 12px; opacity: .8; margin-top: 3px; }
  #detail-close {
    background: rgba(255,255,255,.15); border: none; color: white;
    width: 36px; height: 36px; border-radius: var(--r-sm); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; transition: background .15s;
  }
  #detail-close:active { background: rgba(255,255,255,.3); }
  @media (hover: hover) { #detail-close:hover { background: rgba(255,255,255,.25); } }
  .detail-body { padding: 14px 16px; }
  .detail-desc { font-size: 13px; color: var(--gray-700); line-height: 1.6; margin-bottom: 14px; }
  .detail-meta { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .detail-meta-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray-600); }
  .detail-meta-row svg { width: 14px; height: 14px; stroke: var(--su-green); flex-shrink: 0; }
  .detail-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn-directions {
    padding: 12px 0; background: var(--su-green); color: white; border: none;
    border-radius: var(--r-sm); font-size: 13px; font-family: 'DM Sans', sans-serif;
    font-weight: 500; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background .2s; min-height: 44px;
  }
  .btn-directions:active { background: var(--su-green-light); }
  @media (hover: hover) { .btn-directions:hover { background: var(--su-green-light); } }
  .btn-share {
    padding: 12px 0; background: var(--su-gold-light); color: var(--su-gold);
    border: 1.5px solid #e8c97a; border-radius: var(--r-sm);
    font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 6px; transition: background .2s; min-height: 44px;
  }
  .btn-share:active { background: #faecc8; }
  @media (hover: hover) { .btn-share:hover { background: #faecc8; } }

  /* ══════════ DIRECTIONS PANEL ══════════ */
  #directions-panel {
    position: absolute; left: 12px; top: 78px;
    width: var(--panel-w); z-index: 960;
    background: white; border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg); display: none; overflow: hidden;
  }
  #directions-panel.visible { display: block; }
  .dir-header { background: var(--su-green); padding: 14px 16px; color: white; display: flex; align-items: center; gap: 10px; }
  #dir-close {
    background: rgba(255,255,255,.15); border: none; color: white;
    width: 36px; height: 36px; border-radius: var(--r-sm); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; transition: background .15s;
  }
  #dir-close:active { background: rgba(255,255,255,.3); }
  @media (hover: hover) { #dir-close:hover { background: rgba(255,255,255,.25); } }
  .dir-header-title { font-family: 'Playfair Display', serif; font-size: 15px; }
  .dir-inputs { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--gray-100); }
  .dir-input-row { display: flex; align-items: center; gap: 10px; background: var(--gray-50); border-radius: var(--r-sm); padding: 10px 12px; min-height: 48px; }
  .dir-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dir-dot.origin { background: #4CAF50; }
  .dir-dot.dest { background: var(--su-green); }
  .dir-input-row select {
    flex: 1; font-size: 14px; color: var(--gray-700);
    background: none; border: none; outline: none;
    font-family: 'DM Sans', sans-serif;
    min-height: 28px; cursor: pointer;
    -webkit-appearance: none; appearance: none;
  }
  .dir-input-row select option { background: white; }
  .dir-connector { width: 1.5px; height: 16px; background: var(--gray-300); margin-left: 16px; }

  /* Route mode badge */
  #route-mode-badge { margin: 0 16px 10px; padding: 8px 12px; border-radius: var(--r-sm); font-size: 12px; font-weight: 500; display: none; }
  #route-mode-badge.campus { background: #EAF3EE; color: #1B4D2E; display: block; }
  #route-mode-badge.osrm   { background: #FDF3E3; color: #C8922A; display: block; }

  .btn-get-directions {
    margin: 12px 16px 14px; width: calc(100% - 32px);
    padding: 13px 0; background: var(--su-green); color: white;
    border: none; border-radius: var(--r-sm); font-size: 14px;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    cursor: pointer; transition: background .2s; min-height: 48px;
  }
  .btn-get-directions:active { background: var(--su-green-light); }
  @media (hover: hover) { .btn-get-directions:hover { background: var(--su-green-light); } }

  #steps-container { max-height: 300px; overflow-y: auto; padding: 0 16px 16px; }
  .step-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
  .step-item:last-child { border-bottom: none; }
  .step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--su-green-pale); color: var(--su-green); font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .step-text { font-size: 12px; color: var(--gray-700); line-height: 1.5; }
  .step-dist { font-size: 11px; color: var(--gray-500); margin-top: 2px; }

  /* ══════════ FLOATING CONTROLS ══════════ */
  #float-controls { position: absolute; right: 12px; bottom: 180px; display: flex; flex-direction: column; gap: 8px; z-index: 900; }
  .float-btn {
    width: 48px; height: 48px; background: white; border: none;
    border-radius: var(--r-md); box-shadow: var(--shadow-md); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; color: var(--gray-700);
  }
  .float-btn:active { background: var(--su-green); color: white; }
  .float-btn:active svg { stroke: white; }
  @media (hover: hover) {
    .float-btn:hover { background: var(--su-green); color: white; transform: scale(1.05); }
    .float-btn:hover svg { stroke: white; }
  }
  .float-btn svg { stroke: var(--gray-700); width: 20px; height: 20px; }
  /* Leaflet zoom alignment */
  .leaflet-bottom.leaflet-right { bottom: 10px; right: 12px; }

  /* ══════════ BOTTOM NAV (Mobile) ══════════ */
  #bottom-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: white; box-shadow: 0 -2px 12px rgba(0,0,0,.08);
    display: none; z-index: 1000;
    padding: 4px 0 env(safe-area-inset-bottom, 0);
    border-top: 1px solid var(--gray-100);
  }
  .bottom-nav-inner { display: flex; align-items: stretch; justify-content: space-around; }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px; padding: 10px 8px;
    background: none; border: none; cursor: pointer;
    color: var(--gray-500); font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 500; transition: color .15s;
    border-radius: var(--r-sm); min-height: 56px;
  }
  .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; }
  .nav-btn.active { color: var(--su-green); }
  .nav-btn.active svg { stroke: var(--su-green); }

  /* ══════════ MOBILE BOTTOM SHEET ══════════ */
  #mobile-sheet {
    position: absolute; left: 0; right: 0;
    bottom: var(--nav-h);
    background: white;
    border-radius: var(--r-xl) var(--r-xl) 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,.12);
    z-index: 950; display: none;
    flex-direction: column;
    overflow: hidden;
    height: min(78dvh, calc(100dvh - var(--nav-h) - 8px));
    max-height: calc(100dvh - var(--nav-h) - 8px);
    transform: translate3d(0, var(--sheet-translate-y, 0px), 0);
    transition: transform .28s cubic-bezier(0.22, 0.61, 0.36, 1);
    will-change: transform;
  }
  #mobile-sheet.dragging { transition: none; }
  .sheet-handle {
    width: 40px; height: 4px; background: var(--gray-200);
    border-radius: 2px; margin: 10px auto 8px;
    flex-shrink: 0; cursor: grab;
    touch-action: none;
  }
  #mobile-sheet.dragging .sheet-handle { cursor: grabbing; }
  .sheet-content {
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    flex: 1; padding: 0 0 12px;
  }
  body.sheet-dragging {
    user-select: none;
    -webkit-user-select: none;
  }

  /* ══════════ MOBILE DIRECTIONS SHEET ══════════ */
  #mobile-dir-sheet {
    position: absolute; left: 0; right: 0;
    bottom: var(--nav-h);
    background: white;
    border-radius: var(--r-xl) var(--r-xl) 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,.12);
    z-index: 960; display: none;
    flex-direction: column;
    overflow: hidden;
    height: min(82dvh, calc(100dvh - var(--nav-h) - 8px));
    max-height: calc(100dvh - var(--nav-h) - 8px);
    transform: translate3d(0, var(--dir-sheet-translate-y, 0px), 0);
    transition: transform .28s cubic-bezier(0.22, 0.61, 0.36, 1);
    will-change: transform;
  }
  #mobile-dir-sheet.dragging { transition: none; }
  #mobile-dir-sheet.visible { display: flex; }
  .mobile-dir-handle {
    width: 40px; height: 4px; background: var(--gray-200);
    border-radius: 2px; margin: 10px auto 6px;
    flex-shrink: 0; cursor: grab;
    touch-action: none;
  }
  #mobile-dir-sheet.dragging .mobile-dir-handle { cursor: grabbing; }
  .mobile-dir-content {
    overflow-y: auto;
    overscroll-behavior: contain;
    flex: 1; -webkit-overflow-scrolling: touch; padding-bottom: 16px;
  }
  #mobile-steps-container { max-height: 180px; overflow-y: auto; padding: 0 16px 16px; }
  .mobile-dir-header { background: var(--su-green); padding: 14px 16px; color: white; display: flex; align-items: center; gap: 10px; }
  #mobile-dir-close {
    background: rgba(255,255,255,.15); border: none; color: white;
    width: 36px; height: 36px; border-radius: var(--r-sm); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; transition: background .15s;
  }

  /* ══════════ TOAST ══════════ */
  #toast {
    position: absolute; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--gray-900); color: white;
    padding: 10px 18px; border-radius: var(--r-md);
    font-size: 13px; z-index: 9999; opacity: 0;
    transition: all .3s ease;
    white-space: nowrap; pointer-events: none;
    max-width: calc(100vw - 32px);
    text-overflow: ellipsis; overflow: hidden;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ══════════ LEGEND (Desktop only) ══════════ */
  #legend {
    position: absolute; right: 12px; top: 78px;
    z-index: 900; background: white; border-radius: var(--r-md);
    box-shadow: var(--shadow-md); padding: 10px 14px; max-width: 160px;
  }
  #legend h4 { font-size: 11px; font-weight: 600; color: var(--su-green); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; color: var(--gray-600); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ══════════ CATEGORY COLORS ══════════ */
  .cat-facility  { background: #E8F4FD; color: #1565C0; }
  .cat-venue     { background: #F3E5F5; color: #6A1B9A; }
  .cat-dormitory { background: #E8F5E9; color: #2E7D32; }

  /* ══════════ LEAFLET CUSTOM MARKER ══════════ */
  .su-marker {
    width: 22px !important; height: 22px !important; border-radius: 50%;
    border: 2.5px solid white; box-shadow: 0 2px 6px rgba(0,0,0,.3);
    cursor: pointer; transition: transform .2s, box-shadow .2s;
    background: var(--marker-color, #555);
  }
  @media (hover: hover) { .su-marker:hover { transform: scale(1.2); } }
  .su-pin-wrap {
    position: relative;
    width: 34px;
    height: 56px;
    pointer-events: none;
  }
  .su-selected-pin,
  .su-route-pin {
    width: 28px !important;
    height: 42px !important;
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.3));
  }
  .su-selected-pin::before,
  .su-route-pin::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2.5px solid white;
    background: var(--pin-color, var(--su-green));
    box-sizing: border-box;
  }
  .su-selected-pin::after,
  .su-route-pin::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 21px;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 15px solid var(--pin-color, var(--su-green));
  }
  .su-pin-dot {
    position: absolute;
    left: 50%;
    top: 9px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    transform: translateX(-50%);
    background: white;
    z-index: 2;
  }
  .su-route-pin.origin      { --pin-color: var(--su-green); }
  .su-route-pin.destination { --pin-color: var(--su-gold);  }
  .su-marker-label {
    position: absolute;
    left: 50%;
    top: 44px;
    transform: translateX(-50%);
    background: white; color: #212529;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 600;
    white-space: nowrap; padding: 3px 8px;
    border-radius: 20px; box-shadow: 0 2px 6px rgba(0,0,0,.2);
    pointer-events: none;
  }
  .user-dot {
    width: 16px !important; height: 16px !important;
    background: #4285F4; border: 2.5px solid white;
    border-radius: 50%;
    box-shadow: 0 0 0 6px rgba(66,133,244,.2);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 6px rgba(66,133,244,.2); }
    50%       { box-shadow: 0 0 0 10px rgba(66,133,244,.06); }
  }

  /* ══════════ RESPONSIVE — MOBILE ══════════ */
  @media (max-width: 768px) {
    :root { --topbar-h: 60px; }

    /* Hide desktop panels */
    #side-panel, #detail-panel, #directions-panel, #legend { display: none !important; }

    /* Show mobile UI */
    #bottom-nav { display: block; }
    #mobile-sheet { display: flex; }

    /* Float controls sit above the bottom nav */
    #float-controls { bottom: calc(var(--nav-h) + 16px); right: 10px; }
    .float-btn { width: 44px; height: 44px; }

    /* Topbar: narrower, logo icon-only */
    #topbar { padding: 10px 10px 0; gap: 8px; }
    #logo-pill span, #logo-pill small { display: none; }
    #logo-pill { padding: 10px; border-radius: var(--r-md); }

    /* Search input stays readable */
    #search-input { font-size: 16px; }

    /* Toast above nav */
    #toast { bottom: calc(var(--nav-h) + 16px); }

    /* Leaflet zoom control above float buttons */
    .leaflet-bottom.leaflet-right { bottom: calc(var(--nav-h) + 110px); right: 10px; }
  }

  /* ══════════ RESPONSIVE — DESKTOP ══════════ */
  @media (min-width: 769px) {
    #bottom-nav, #mobile-sheet, #mobile-dir-sheet { display: none !important; }
    #float-controls { bottom: 180px; }
  }

  /* ══════════ VERY SMALL SCREENS (≤ 360px) ══════════ */
  @media (max-width: 360px) {
    #logo-pill { padding: 8px; }
    #search-input { font-size: 15px; }
    .nav-btn { font-size: 10px; padding: 8px 4px; }
    .nav-btn svg { width: 20px; height: 20px; }
  }

  /* ══════════ SCROLLBAR ══════════ */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px; }
</style>

const CATEGORIES = [
  { id:"all",       label:"All",         icon:"🗺️" },
  { id:"facility",  label:"Facility",    icon:"🏫" },
  { id:"venue",     label:"Venue",       icon:"🎭" },
  { id:"dormitory", label:"Dormitory",   icon:"🏠" },
];

const CAT_COLORS = {
  facility:  '#1565C0',
  venue:     '#6A1B9A',
  dormitory: '#2E7D32',
};

/* ─── STATE ─── */
let map = null;
let markers = {};          // { locId: L.marker }
let routeLayer = null;
let routeEndpointMarkers = [];
let userMarker = null;
let watchId = null;        // geolocation watchPosition handle (live tracking)
let selectedLocation = null;
let activeCategory = 'all';


/* ════════════════════════════════════════════════════════
   MAP INIT  —  Leaflet + OpenStreetMap (free, no key)
   ════════════════════════════════════════════════════════ */
function initMap() {
  map = L.map('map', {
    center: [SU_CENTER.lat, SU_CENTER.lng],
    zoom: 17,
    zoomControl: false,
  });

  // CartoDB Positron tiles — free, no API key, works on local files too
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19,
  }).addTo(map);

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  addAllMarkers();

  // Start live location tracking immediately
  startLiveTracking(true); // true = pan to user on first fix
}


/* ════════════════════════════════════════════════════════
   MARKERS
   ════════════════════════════════════════════════════════ */
function addAllMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  const filtered = activeCategory === 'all'
    ? LOCATIONS
    : LOCATIONS.filter(l => l.category === activeCategory);

  filtered.forEach(loc => {
    const isSelected = selectedLocation?.id === loc.id;
    const marker = L.marker([loc.lat, loc.lng], {
      icon: isSelected ? createSelectedLocationMarkerIcon(loc) : createDefaultLocationMarkerIcon(loc),
      title: loc.short,
    })
      .addTo(map)
      .on('click', () => selectLocation(loc));
    marker.setZIndexOffset(isSelected ? 1200 : 0);
    markers[loc.id] = marker;
  });
}


/* ════════════════════════════════════════════════════════
   DETAIL PANEL
   ════════════════════════════════════════════════════════ */
function getMarkerColor(loc) {
  return CAT_COLORS[loc.category] || '#555';
}

function createDefaultLocationMarkerIcon(loc) {
  return L.divIcon({
    className: '',
    html: `<div class="su-marker" style="--marker-color:${getMarkerColor(loc)}"></div>`,
    iconSize: [22, 22],
    iconAnchor: [11, 11],
  });
}

function createSelectedLocationMarkerIcon(loc) {
  return L.divIcon({
    className: '',
    html: `
      <div class="su-pin-wrap">
        <div class="su-selected-pin" style="--pin-color:${getMarkerColor(loc)}"><span class="su-pin-dot"></span></div>
        <div class="su-marker-label">${loc.short}</div>
      </div>`,
    iconSize: [34, 56],
    iconAnchor: [17, 36],
  });
}

function createRouteEndpointMarkerIcon(type) {
  const klass = type === 'origin' ? 'origin' : 'destination';
  return L.divIcon({
    className: '',
    html: `<div class="su-pin-wrap"><div class="su-route-pin ${klass}"><span class="su-pin-dot"></span></div></div>`,
    iconSize: [34, 46],
    iconAnchor: [17, 36],
  });
}

function setLocationMarkerState(loc, isSelected) {
  const marker = loc ? markers[loc.id] : null;
  if (!marker) return;
  marker.setIcon(isSelected ? createSelectedLocationMarkerIcon(loc) : createDefaultLocationMarkerIcon(loc));
  marker.setZIndexOffset(isSelected ? 1200 : 0);
}

function clearRouteEndpointMarkers() {
  routeEndpointMarkers.forEach(m => map.removeLayer(m));
  routeEndpointMarkers = [];
}

function showRouteEndpointMarkers(origin, dest) {
  clearRouteEndpointMarkers();
  if (!origin || !dest) return;

  const originMarker = L.marker([origin.lat, origin.lng], {
    icon: createRouteEndpointMarkerIcon('origin'),
    interactive: false,
    keyboard: false,
    zIndexOffset: 2500,
  }).addTo(map);

  const destMarker = L.marker([dest.lat, dest.lng], {
    icon: createRouteEndpointMarkerIcon('destination'),
    interactive: false,
    keyboard: false,
    zIndexOffset: 2500,
  }).addTo(map);

  routeEndpointMarkers = [originMarker, destMarker];
}

function resetActiveRouteUI() {
  const hasActiveRoute = !!routeLayer || routeEndpointMarkers.length > 0;
  if (!hasActiveRoute) return;

  clearRouteLayer();

  const desktopSteps = document.getElementById('steps-container');
  if (desktopSteps) desktopSteps.innerHTML = '';
  const desktopBadge = document.getElementById('route-mode-badge');
  if (desktopBadge) {
    desktopBadge.className = '';
    desktopBadge.textContent = '';
  }

  const mobileSteps = document.getElementById('mobile-steps-container');
  if (mobileSteps) mobileSteps.innerHTML = '';
  const mobileBadge = document.getElementById('mobile-route-badge');
  if (mobileBadge) {
    mobileBadge.style.display = 'none';
    mobileBadge.textContent = '';
  }

  const mobileDirSheet = document.getElementById('mobile-dir-sheet');
  if (mobileDirSheet) mobileDirSheet.classList.remove('has-route');
}

function selectLocation(loc) {
  const isDifferentSelection = !selectedLocation || selectedLocation.id !== loc.id;
  if (isDifferentSelection && (routeLayer || routeEndpointMarkers.length)) {
    resetActiveRouteUI();
  }

  if (selectedLocation && selectedLocation.id !== loc.id) {
    setLocationMarkerState(selectedLocation, false);
  }

  selectedLocation = loc;
  setLocationMarkerState(loc, true);

  document.getElementById('detail-icon').textContent     = loc.icon;
  document.getElementById('detail-title').textContent    = loc.name;
  document.getElementById('detail-subtitle').textContent = loc.category.charAt(0).toUpperCase() + loc.category.slice(1);
  document.getElementById('detail-desc').textContent     = loc.desc;
  document.getElementById('detail-meta').innerHTML = `
    <div class="detail-meta-row">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      ${loc.hours}
    </div>
    <div class="detail-meta-row">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 4.64 5.18a2 2 0 0 1 1.995-2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L10.91 10.91a16 16 0 0 0 6.18 6.18l1.24-.88a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2z"/></svg>
      ${loc.contact}
    </div>`;
  const panel = document.getElementById('detail-panel');
  panel.style.display = 'block';
  setTimeout(() => panel.classList.add('visible'), 10);
  map.panTo([loc.lat, loc.lng]);
}

function closeDetail() {
  const panel = document.getElementById('detail-panel');
  panel.classList.remove('visible');
  setTimeout(() => { panel.style.display = 'none'; }, 250);
  if (selectedLocation) setLocationMarkerState(selectedLocation, false);
  selectedLocation = null;
}


/* ════════════════════════════════════════════════════════
   DIRECTIONS PANEL
   ════════════════════════════════════════════════════════ */
function openDirections() {
  document.getElementById('directions-panel').classList.add('visible');
  document.getElementById('detail-panel').classList.remove('visible');
  setTimeout(() => document.getElementById('detail-panel').style.display = 'none', 250);
  populateDirectionSelects();
}

function closeDirections() {
  document.getElementById('directions-panel').classList.remove('visible');
  clearRouteLayer();
  document.getElementById('steps-container').innerHTML = '';
  const badge = document.getElementById('route-mode-badge');
  badge.className = ''; badge.textContent = '';
}

function populateDirectionSelects() {
  const destSel = document.getElementById('dest-select');
  const origSel = document.getElementById('origin-select');
  destSel.innerHTML = '<option value="">Select destination…</option>';
  origSel.innerHTML = '<option value="current">📍 My current location</option>';
  LOCATIONS.forEach(loc => {
    destSel.add(new Option(`${loc.icon} ${loc.short}`, loc.id));
    origSel.add(new Option(`${loc.icon} ${loc.short}`, loc.id));
  });
  if (selectedLocation) destSel.value = selectedLocation.id;
}

function clearRouteLayer() {
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  clearRouteEndpointMarkers();
}


/* ════════════════════════════════════════════════════════
   ROUTING ENTRY POINT
   ════════════════════════════════════════════════════════ */
function calculateRoute() {
  const origVal = document.getElementById('origin-select').value;
  const destVal = document.getElementById('dest-select').value;
  if (!destVal) { showToast('Please select a destination.'); return; }

  const dest = LOCATIONS.find(l => l.id == destVal);
  if (!dest) return;

  const resolveOrigin = (cb) => {
    if (origVal === 'current') {
      // Reuse the live-tracking position we already have — avoids
      // conflicts with the watchPosition that's already running.
      if (userMarker) {
        const ll = userMarker.getLatLng();
        cb({ lat: ll.lat, lng: ll.lng });
      } else {
        // Tracking not started yet — fall back to a one-shot request
        if (!navigator.geolocation) { showToast('Geolocation not supported.'); return; }
        navigator.geolocation.getCurrentPosition(
          pos => cb({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
          ()   => { showToast('Could not get your location. Try selecting a building as origin.'); }
        );
      }
    } else {
      const orig = LOCATIONS.find(l => l.id == origVal);
      if (orig) cb({ lat: orig.lat, lng: orig.lng });
    }
  };

  resolveOrigin(origin => selectRouter(origin, dest));
}

/*
  ┌──────────────────────────────────────────────────────┐
  │  selectRouter                                        │
  │  Decision point — campus graph OR OSRM fallback.     │
  │                                                      │
  │  When you're ready to add campus paths:              │
  │   1. Set CAMPUS_ROUTING_ENABLED = true               │
  │   2. Fill CAMPUS_GRAPH below                         │
  │   3. Implement campusRoute()                         │
  └──────────────────────────────────────────────────────┘
*/
function selectRouter(origin, dest) {
  if (CAMPUS_ROUTING_ENABLED && isInsideCampus(origin) && isInsideCampus(dest)) {
    campusRoute(origin, dest);
  } else {
    osrmRoute(origin, dest);
  }
}

function isInsideCampus(point) {
  /* Bounding box updated to cover all verified volunteer coordinates. */
  return (
    point.lat >= 9.3040 && point.lat <= 9.3160 &&
    point.lng >= 123.3035 && point.lng <= 123.3100
  );
}


/* ════════════════════════════════════════════════════════
   ENGINE 1 — CAMPUS ROUTER  (A* on CAMPUS_GRAPH)
   ════════════════════════════════════════════════════════ */

/* Haversine distance in meters between two {lat,lng} objects */
function haversineM(a, b) {
  const R = 6371000;
  const φ1 = a.lat * Math.PI/180, φ2 = b.lat * Math.PI/180;
  const dφ = (b.lat - a.lat) * Math.PI/180;
  const dλ = (b.lng - a.lng) * Math.PI/180;
  const s = Math.sin(dφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

/* Find the graph node closest to a given {lat,lng} point.
   If preferBuilding is true, checks building nodes (b##) first
   so that known entrances snap directly to their own node. */
function nearestNode(point, preferBuilding = false) {
  const nodes = CAMPUS_GRAPH.nodes;
  let best = null, bestDist = Infinity;

  // If preferBuilding, check b-nodes first with a tight tolerance (30m)
  if (preferBuilding) {
    for (const [id, node] of Object.entries(nodes)) {
      if (!id.startsWith('b')) continue;
      const d = haversineM(point, node);
      if (d < 30 && d < bestDist) { bestDist = d; best = id; }
    }
    if (best) return best;
  }

  // Fall back to nearest of any node
  for (const [id, node] of Object.entries(nodes)) {
    const d = haversineM(point, node);
    if (d < bestDist) { bestDist = d; best = id; }
  }
  return best;
}

/* A* pathfinding — returns array of node IDs or null if no path */
function aStar(startId, goalId) {
  const nodes = CAMPUS_GRAPH.nodes;

  // Build adjacency list from edge list
  const adj = {};
  for (const id of Object.keys(nodes)) adj[id] = [];
  for (const edge of CAMPUS_GRAPH.edges) {
    adj[edge.from].push({ to: edge.to, dist: edge.dist });
  }

  const h = id => haversineM(nodes[id], nodes[goalId]); // heuristic

  const open   = new Set([startId]);
  const cameFrom = {};
  const gScore  = { [startId]: 0 };
  const fScore  = { [startId]: h(startId) };

  while (open.size > 0) {
    // Node in open with lowest fScore
    let current = [...open].reduce((a, b) =>
      (fScore[a] ?? Infinity) < (fScore[b] ?? Infinity) ? a : b);

    if (current === goalId) {
      // Reconstruct path
      const path = [current];
      while (cameFrom[current]) { current = cameFrom[current]; path.unshift(current); }
      return path;
    }

    open.delete(current);
    for (const { to, dist } of (adj[current] || [])) {
      const tentative = (gScore[current] ?? Infinity) + dist;
      if (tentative < (gScore[to] ?? Infinity)) {
        cameFrom[to] = current;
        gScore[to]   = tentative;
        fScore[to]   = tentative + h(to);
        open.add(to);
      }
    }
  }
  return null; // no path found
}

function campusRoute(origin, dest) {
  const nodes = CAMPUS_GRAPH.nodes;

  if (!nodes || Object.keys(nodes).length === 0) {
    showToast('Campus graph not loaded. Using road directions.');
    osrmRoute(origin, dest);
    return;
  }

  const originNode = nearestNode(origin, true);
  const destNode   = nearestNode(dest,   true);

  if (!originNode || !destNode) {
    showToast('Could not find nearby path. Using road directions.');
    osrmRoute(origin, dest);
    return;
  }

  if (originNode === destNode) {
    showToast('Origin and destination are on the same path node.');
    return;
  }

  const path = aStar(originNode, destNode);

  if (!path || path.length < 2) {
    // Disconnected graph component — fall back to OSRM
    showToast('No campus path found. Using road directions.');
    osrmRoute(origin, dest);
    return;
  }

  // Build latlngs array and compute total distance
  const latlngs = path.map(id => [nodes[id].lat, nodes[id].lng]);
  let totalDist = 0;
  for (let i = 0; i < path.length - 1; i++) {
    totalDist += haversineM(nodes[path[i]], nodes[path[i+1]]);
  }

  // Simple turn-by-turn: just list each node as a step
  const steps = path.slice(1).map((id, i) => {
    const prev = nodes[path[i]];
    const curr = nodes[id];
    const d    = haversineM(prev, curr);
    return { text: nodes[id].label || `Continue to waypoint`, dist: formatDist(d) };
  });

  drawRoute(latlngs, steps, formatDist(totalDist), formatDuration(totalDist / 1.2), 'campus', origin, dest);
}


/* ════════════════════════════════════════════════════════
   ENGINE 2 — OSRM  (free, no API key, works now)
   Uses the public OSRM demo server with foot profile.
   ════════════════════════════════════════════════════════ */
async function osrmRoute(origin, dest) {
  showToast('Calculating route…');
  const url =
    `https://router.project-osrm.org/route/v1/foot/` +
    `${origin.lng},${origin.lat};${dest.lng},${dest.lat}` +
    `?overview=full&geometries=geojson&steps=true`;

  try {
    const res  = await fetch(url);
    const data = await res.json();

    if (data.code !== 'Ok' || !data.routes.length) {
      showToast('Could not find a route. Try different locations.');
      return;
    }

    const route   = data.routes[0];
    const leg     = route.legs[0];
    const coords  = route.geometry.coordinates.map(([lng, lat]) => [lat, lng]);
    const steps   = leg.steps.map(s => ({
      text: s.maneuver.instruction || s.name || 'Continue',
      dist: formatDist(s.distance),
    }));

    drawRoute(coords, steps, formatDist(route.distance), formatDuration(route.duration), 'osrm', origin, dest);
  } catch (err) {
    showToast('Network error. Check your internet connection.');
  }
}


/* ════════════════════════════════════════════════════════
   DRAW ROUTE  (shared by both engines)
   ════════════════════════════════════════════════════════ */
function drawRoute(latlngs, steps, dist, duration, mode, origin, dest) {
  clearRouteLayer();

  routeLayer = L.polyline(latlngs, {
    color: '#1B4D2E', weight: 5, opacity: 0.85, lineJoin: 'round',
  }).addTo(map);
  showRouteEndpointMarkers(origin, dest);

  map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });

  // Mode badge
  const badge = document.getElementById('route-mode-badge');
  if (mode === 'campus') {
    badge.className = 'campus';
    badge.textContent = '🗺️ Using campus walkways';
  } else {
    badge.className = 'osrm';
    badge.textContent = '🌐 Using OpenStreetMap roads';
  }

  // Summary + steps
  const container = document.getElementById('steps-container');
  container.innerHTML = `
    <div style="display:flex;gap:12px;padding:8px 0 12px;margin-bottom:4px;border-bottom:1px solid #eee;">
      <div style="flex:1;text-align:center;background:#EAF3EE;border-radius:8px;padding:8px 4px;">
        <div style="font-size:17px;font-weight:600;color:#1B4D2E">${duration}</div>
        <div style="font-size:11px;color:#6C757D;margin-top:2px">walking</div>
      </div>
      <div style="flex:1;text-align:center;background:#F8F9FA;border-radius:8px;padding:8px 4px;">
        <div style="font-size:17px;font-weight:600;color:#495057">${dist}</div>
        <div style="font-size:11px;color:#6C757D;margin-top:2px">distance</div>
      </div>
    </div>`;

  steps.forEach((step, i) => {
    const div = document.createElement('div');
    div.className = 'step-item';
    div.innerHTML = `
      <div class="step-num">${i + 1}</div>
      <div>
        <div class="step-text">${step.text}</div>
        <div class="step-dist">${step.dist}</div>
      </div>`;
    container.appendChild(div);
  });
}


/* ════════════════════════════════════════════════════════
   MAP CONTROLS
   ════════════════════════════════════════════════════════ */
function centerOnCampus() { map.setView([SU_CENTER.lat, SU_CENTER.lng], 17); }

function startLiveTracking(panOnFirstFix = false) {
  if (!navigator.geolocation) {
    showToast('Geolocation not supported on this device.');
    showToast('Campus map loaded! Tap any location to explore.');
    return;
  }

  let firstFix = true;

  const userIcon = L.divIcon({
    className: '',
    html: '<div class="user-dot"></div>',
    iconSize: [16, 16], iconAnchor: [8, 8],
  });

  watchId = navigator.geolocation.watchPosition(
    pos => {
      const latlng = [pos.coords.latitude, pos.coords.longitude];

      if (!userMarker) {
        userMarker = L.marker(latlng, {
          icon: userIcon,
          title: 'You are here',
          zIndexOffset: 1000,
        }).addTo(map);
      } else {
        userMarker.setLatLng(latlng);
      }

      if (firstFix) {
        firstFix = false;
        if (panOnFirstFix) {
          map.setView(latlng, 18);
          showToast('Your location is shown in blue. It updates as you move.');
        } else {
          showToast('Location found! Dot updates as you move.');
        }
      }
    },
    () => {
      if (panOnFirstFix) {
        // Called on page load — permission denied, just load normally
        showToast('Campus map loaded! Tap any location to explore.');
      } else {
        showToast('Could not access your location.');
      }
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
  );
}

function locateMe() {
  // If already tracking, just pan back to the user dot
  if (userMarker) {
    map.setView(userMarker.getLatLng(), 18);
    showToast('Centred on your location.');
    return;
  }
  // Otherwise start tracking (happens if permission was denied at load)
  startLiveTracking(false);
}

function shareLocation() {
  if (!selectedLocation) return;
  const text = `Find ${selectedLocation.name} at Silliman University`;
  if (navigator.share) {
    navigator.share({ title: selectedLocation.name, text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('Location info copied!'));
  }
}


/* ════════════════════════════════════════════════════════
   LIST RENDERING  (safe — uses data attributes, no inline JSON)
   ════════════════════════════════════════════════════════ */
function renderLocations(list, containerId) {
  const el = document.getElementById(containerId);
  if (!list.length) {
    el.innerHTML = `<div style="padding:24px;text-align:center;color:#ADB5BD;font-size:13px;">No locations found</div>`;
    return;
  }
  el.innerHTML = list.map(loc => `
    <div class="location-item ${selectedLocation?.id === loc.id ? 'active' : ''}" data-loc-id="${loc.id}">
      <div class="loc-icon cat-${loc.category}">${loc.icon}</div>
      <div class="loc-info">
        <div class="loc-name">${loc.short}</div>
        <div class="loc-desc">${loc.desc.substring(0, 55)}…</div>
      </div>
      <button class="loc-go-btn" data-dir-id="${loc.id}" title="Directions">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path d="M3 12h18M13 5l7 7-7 7"/></svg>
      </button>
    </div>`).join('');

  el.querySelectorAll('.location-item').forEach(item => {
    item.addEventListener('click', () => {
      const loc = LOCATIONS.find(l => l.id === parseInt(item.dataset.locId));
      if (loc) selectLocation(loc);
    });
  });
  el.querySelectorAll('.loc-go-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const loc = LOCATIONS.find(l => l.id === parseInt(btn.dataset.dirId));
      if (loc) { selectedLocation = loc; openDirections(); }
    });
  });
}

function renderCategories(containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = CATEGORIES.map(cat => `
    <button class="chip ${activeCategory === cat.id ? 'active' : ''}" data-cat="${cat.id}">
      <span class="chip-icon">${cat.icon}</span>${cat.label}
    </button>`).join('');
  el.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => setCategory(btn.dataset.cat));
  });
}

function setCategory(catId) {
  activeCategory = catId;
  renderCategories('category-scroll');
  renderCategories('mobile-category-scroll');
  const filtered = activeCategory === 'all' ? LOCATIONS : LOCATIONS.filter(l => l.category === activeCategory);
  renderLocations(filtered, 'locations-list');
  renderLocations(filtered, 'mobile-locations-list');
  document.getElementById('location-count').textContent = `${filtered.length} places`;
  if (map) addAllMarkers();
}

  const q = this.value.trim().toLowerCase();
  const clearBtn  = document.getElementById('search-clear');

    l.name.toLowerCase().includes(q) || l.short.toLowerCase().includes(q) ||

function mobileNav(tab) {
  if (!isMobileViewport()) return;

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + tab)?.classList.add('active');

  if (tab === 'directions') {
    // Show mobile directions sheet, hide explore sheet
    mobileSheetController?.hide();
    openMobileDirections();
  } else {
    // Show explore sheet, hide directions
    closeMobileDirections();
  }
}

function openMobileDirections() {
  const dirSheet = document.getElementById('mobile-dir-sheet');
  if (mobileDirSheetController) {
    mobileDirSheetController.show('mid');
  } else if (dirSheet) {
    dirSheet.classList.add('visible');
    dirSheet.style.display = 'flex';
  }
  populateMobileDirectionSelects();
}

function closeMobileDirections() {
  const dirSheet = document.getElementById('mobile-dir-sheet');
  dirSheet.classList.remove('visible');
  dirSheet.classList.remove('has-route');
  if (mobileDirSheetController) {
    mobileDirSheetController.hide();
  } else {
    dirSheet.style.display = 'none';
  }
  clearRouteLayer();
  document.getElementById('mobile-steps-container').innerHTML = '';
  const badge = document.getElementById('mobile-route-badge');
  if (badge) { badge.style.display = 'none'; badge.textContent = ''; }
  // Switch nav back to explore if we were on directions
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-explore')?.classList.add('active');
  if (isMobileViewport()) mobileSheetController?.show('mid');
}

function populateMobileDirectionSelects() {
  const destSel = document.getElementById('mobile-dest-select');
  const origSel = document.getElementById('mobile-origin-select');
  if (!destSel || !origSel) return;
  destSel.innerHTML = '<option value="">Select destination…</option>';
  origSel.innerHTML = '<option value="current">📍 My current location</option>';
  LOCATIONS.forEach(loc => {
    destSel.add(new Option(`${loc.icon} ${loc.short}`, loc.id));
    origSel.add(new Option(`${loc.icon} ${loc.short}`, loc.id));
  });
  if (selectedLocation) destSel.value = selectedLocation.id;
}

function calculateMobileRoute() {
  const origVal = document.getElementById('mobile-origin-select').value;
  const destVal = document.getElementById('mobile-dest-select').value;
  if (!destVal) { showToast('Please select a destination.'); return; }

  const dest = LOCATIONS.find(l => l.id == destVal);
  if (!dest) return;

  const resolveOrigin = (cb) => {
    if (origVal === 'current') {
      if (userMarker) {
        const ll = userMarker.getLatLng();
        cb({ lat: ll.lat, lng: ll.lng });
      } else {
        if (!navigator.geolocation) { showToast('Geolocation not supported.'); return; }
        navigator.geolocation.getCurrentPosition(
          pos => cb({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
          ()   => { showToast('Could not get your location. Try selecting a building as origin.'); }
        );
      }
    } else {
      const orig = LOCATIONS.find(l => l.id == origVal);
      if (orig) cb({ lat: orig.lat, lng: orig.lng });
    }
  };

  resolveOrigin(origin => selectRouterMobile(origin, dest));
}

function selectRouterMobile(origin, dest) {
  if (CAMPUS_ROUTING_ENABLED && isInsideCampus(origin) && isInsideCampus(dest)) {
    campusRouteMobile(origin, dest);
  } else {
    osrmRouteMobile(origin, dest);
  }
}

function campusRouteMobile(origin, dest) {
  const nodes = CAMPUS_GRAPH.nodes;
  if (!nodes || Object.keys(nodes).length === 0) {
    showToast('Campus graph not loaded. Using road directions.');
    osrmRouteMobile(origin, dest); return;
  }
  const originNode = nearestNode(origin, true);
  const destNode   = nearestNode(dest,   true);
  if (!originNode || !destNode) {
    showToast('Could not find nearby path. Using road directions.');
    osrmRouteMobile(origin, dest); return;
  }
  if (originNode === destNode) { showToast('Origin and destination are on the same node.'); return; }
  const path = aStar(originNode, destNode);
  if (!path || path.length < 2) {
    showToast('No campus path found. Using road directions.');
    osrmRouteMobile(origin, dest); return;
  }
  const latlngs = path.map(id => [nodes[id].lat, nodes[id].lng]);
  let totalDist = 0;
  for (let i = 0; i < path.length - 1; i++) totalDist += haversineM(nodes[path[i]], nodes[path[i+1]]);
  const steps = path.slice(1).map((id, i) => {
    const d = haversineM(nodes[path[i]], nodes[id]);
    return { text: nodes[id].label || 'Continue to waypoint', dist: formatDist(d) };
  });
  drawMobileRoute(latlngs, steps, formatDist(totalDist), formatDuration(totalDist / 1.2), 'campus', origin, dest);
}

async function osrmRouteMobile(origin, dest) {
  showToast('Calculating route…');
  const url = `https://router.project-osrm.org/route/v1/foot/${origin.lng},${origin.lat};${dest.lng},${dest.lat}?overview=full&geometries=geojson&steps=true`;
  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (data.code !== 'Ok' || !data.routes.length) { showToast('Could not find a route.'); return; }
    const route  = data.routes[0];
    const leg    = route.legs[0];
    const coords = route.geometry.coordinates.map(([lng, lat]) => [lat, lng]);
    const steps  = leg.steps.map(s => ({ text: s.maneuver.instruction || s.name || 'Continue', dist: formatDist(s.distance) }));
    drawMobileRoute(coords, steps, formatDist(route.distance), formatDuration(route.duration), 'osrm', origin, dest);
  } catch (err) {
    showToast('Network error. Check your internet connection.');
  }
}

function drawMobileRoute(latlngs, steps, dist, duration, mode, origin, dest) {
  clearRouteLayer();
  routeLayer = L.polyline(latlngs, { color: '#1B4D2E', weight: 5, opacity: 0.85, lineJoin: 'round' }).addTo(map);
  showRouteEndpointMarkers(origin, dest);
  map.fitBounds(routeLayer.getBounds(), { padding: [60, 20] });
  document.getElementById('mobile-dir-sheet').classList.add('has-route');
  if (isMobileViewport()) mobileDirSheetController?.show('mid');

  const badge = document.getElementById('mobile-route-badge');
  if (badge) {
    badge.style.display = 'block';
    if (mode === 'campus') {
      badge.style.background = '#EAF3EE'; badge.style.color = '#1B4D2E';
      badge.textContent = '🗺️ Using campus walkways';
    } else {
      badge.style.background = '#FDF3E3'; badge.style.color = '#C8922A';
      badge.textContent = '🌐 Using OpenStreetMap roads';
    }
  }

  const container = document.getElementById('mobile-steps-container');
  container.innerHTML = `
    <div style="display:flex;gap:12px;padding:12px 0;margin-bottom:4px;border-bottom:1px solid #eee;">
      <div style="flex:1;text-align:center;background:#EAF3EE;border-radius:8px;padding:10px 4px;">
        <div style="font-size:18px;font-weight:600;color:#1B4D2E">${duration}</div>
        <div style="font-size:12px;color:#6C757D;margin-top:2px">walking</div>
      </div>
      <div style="flex:1;text-align:center;background:#F8F9FA;border-radius:8px;padding:10px 4px;">
        <div style="font-size:18px;font-weight:600;color:#495057">${dist}</div>
        <div style="font-size:12px;color:#6C757D;margin-top:2px">distance</div>
      </div>
    </div>`;
  steps.forEach((step, i) => {
    const div = document.createElement('div');
    div.className = 'step-item';
    div.innerHTML = `<div class="step-num">${i + 1}</div><div><div class="step-text">${step.text}</div><div class="step-dist">${step.dist}</div></div>`;
    container.appendChild(div);
  });
}

/* Mobile sheets: draggable + snap (collapsed / mid / expanded) */
function createDraggableSheetController({
  sheetId,
  handleSelector,
  contentSelector,
  translateVar,
  initialVisible = false,
  visibleClass = '',
  collapsedVisible = 26,
  midRatio = 0.56,
  minMidVisible = 220,
  minHeight = 280,
  getMidRatio = null,
}) {
  const sheet = document.getElementById(sheetId);
  const handle = sheet?.querySelector(handleSelector);
  const content = sheet?.querySelector(contentSelector);
  if (!sheet || !handle || !content) return null;

  const SNAP_ORDER = ['collapsed', 'mid', 'expanded'];
  const state = {
    activeSnap: 'mid',
    currentOffset: 0,
    snapOffsets: { collapsed: 0, mid: 0, expanded: 0 },
    dragMode: null,
    activeScrollEl: null,
    startY: 0,
    startOffset: 0,
    lastY: 0,
    lastMoveTs: 0,
    velocityY: 0,
    mouseDragging: false,
    isVisible: initialVisible,
  };

  const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

  function readNumberVar(name, fallback) {
    const raw = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    const parsed = parseFloat(raw);
    return Number.isFinite(parsed) ? parsed : fallback;
  }

  function setSheetVisibility(visible) {
    if (visible) {
      sheet.style.display = 'flex';
      if (visibleClass) sheet.classList.add(visibleClass);
      return;
    }
    if (visibleClass) sheet.classList.remove(visibleClass);
    sheet.style.display = 'none';
    sheet.classList.remove('dragging');
    document.body.classList.remove('sheet-dragging');
  }

  function isScrollableY(el) {
    if (!el) return false;
    const style = getComputedStyle(el);
    const canScroll = /(auto|scroll|overlay)/.test(style.overflowY);
    return canScroll && el.scrollHeight > (el.clientHeight + 1);
  }

  function findScrollableAncestor(fromEl) {
    let current = fromEl;
    while (current && current !== content) {
      if (isScrollableY(current)) return current;
      current = current.parentElement;
    }
    return content;
  }

  function nearestSnapFor(offset) {
    return SNAP_ORDER.reduce((best, snap) => (
      Math.abs(offset - state.snapOffsets[snap]) < Math.abs(offset - state.snapOffsets[best]) ? snap : best
    ), 'mid');
  }

  function applyOffset(offset, animate = true) {
    const min = state.snapOffsets.expanded;
    const max = state.snapOffsets.collapsed;
    state.currentOffset = clamp(offset, min, max);
    sheet.style.setProperty(translateVar, `${state.currentOffset}px`);
    sheet.classList.toggle('dragging', !animate);
  }

  function setSnap(snapName = 'mid', animate = true) {
    const safeSnap = state.snapOffsets[snapName] === undefined ? 'mid' : snapName;
    state.activeSnap = safeSnap;
    sheet.dataset.snap = safeSnap;
    applyOffset(state.snapOffsets[safeSnap], animate);
  }

  function computeSnapOffsets() {
    const viewportH = window.visualViewport?.height || window.innerHeight || document.documentElement.clientHeight;
    const navHeight = readNumberVar('--nav-h', 64);
    const topbarHeight = readNumberVar('--topbar-h', 60);
    const reservedTop = Math.max(8, topbarHeight * 0.4);
    const maxHeight = Math.max(minHeight, Math.floor(viewportH - navHeight - reservedTop));
    const dynamicMidRatio = typeof getMidRatio === 'function' ? getMidRatio(sheet) : midRatio;
    const midVisible = clamp(Math.round(maxHeight * dynamicMidRatio), minMidVisible, maxHeight - 44);

    state.snapOffsets = {
      expanded: 0,
      mid: Math.round(maxHeight - midVisible),
      collapsed: Math.round(maxHeight - collapsedVisible),
    };

    sheet.style.height = `${maxHeight}px`;
    sheet.style.maxHeight = `${maxHeight}px`;
  }

  function refreshLayout(animate = false) {
    computeSnapOffsets();
    setSnap(state.activeSnap, animate);
  }

  function beginDrag(startY, source, targetEl = null) {
    if (!isMobileViewport() || !state.isVisible) return;
    state.dragMode = source === 'handle' ? 'drag' : 'pending';
    state.activeScrollEl = source === 'content' ? findScrollableAncestor(targetEl) : content;
    state.startY = startY;
    state.startOffset = state.currentOffset;
    state.lastY = startY;
    state.lastMoveTs = performance.now();
    state.velocityY = 0;
    document.body.classList.add('sheet-dragging');
  }

  function moveDrag(clientY, ev) {
    if (!state.dragMode) return;

    const deltaY = clientY - state.startY;
    if (state.dragMode === 'pending') {
      if (Math.abs(deltaY) < 6) return;

      const scrollEl = state.activeScrollEl || content;
      const draggingDownFromTop = deltaY > 0 && scrollEl.scrollTop <= 0;
      const draggingUpWhileNotExpanded = deltaY < 0 && state.activeSnap !== 'expanded';
      if (draggingDownFromTop || draggingUpWhileNotExpanded) {
        state.dragMode = 'drag';
      } else {
        state.dragMode = 'scroll';
        document.body.classList.remove('sheet-dragging');
        return;
      }
    }

    if (state.dragMode !== 'drag') return;
    if (ev?.cancelable) ev.preventDefault();

    const now = performance.now();
    const dt = now - state.lastMoveTs;
    if (dt > 0) state.velocityY = (clientY - state.lastY) / dt;
    state.lastY = clientY;
    state.lastMoveTs = now;
    applyOffset(state.startOffset + deltaY, false);
  }

  function endDrag() {
    if (!state.dragMode) {
      state.mouseDragging = false;
      document.body.classList.remove('sheet-dragging');
      return;
    }

    if (state.dragMode === 'drag') {
      const projected = state.currentOffset + (state.velocityY * 180);
      const targetSnap = nearestSnapFor(projected);
      setSnap(targetSnap, true);
    }

    state.dragMode = null;
    state.activeScrollEl = null;
    state.velocityY = 0;
    state.mouseDragging = false;
    sheet.classList.remove('dragging');
    document.body.classList.remove('sheet-dragging');
  }

  function addTouchListeners(target, source) {
    target.addEventListener('touchstart', ev => {
      if (!ev.touches.length) return;
      beginDrag(ev.touches[0].clientY, source, ev.target);
    }, { passive: true });

    target.addEventListener('touchmove', ev => {
      if (!ev.touches.length) return;
      moveDrag(ev.touches[0].clientY, ev);
    }, { passive: false });

    target.addEventListener('touchend', () => endDrag(), { passive: true });
    target.addEventListener('touchcancel', () => endDrag(), { passive: true });
  }

  addTouchListeners(handle, 'handle');
  addTouchListeners(content, 'content');

  handle.addEventListener('mousedown', ev => {
    if (ev.button !== 0) return;
    state.mouseDragging = true;
    beginDrag(ev.clientY, 'handle', ev.target);
    ev.preventDefault();
  });

  content.addEventListener('mousedown', ev => {
    if (ev.button !== 0) return;
    state.mouseDragging = true;
    beginDrag(ev.clientY, 'content', ev.target);
  });

  window.addEventListener('mousemove', ev => {
    if (!state.mouseDragging) return;
    moveDrag(ev.clientY, ev);
  });

  window.addEventListener('mouseup', () => {
    if (!state.mouseDragging) return;
    endDrag();
  });

  function applyViewportMode() {
    if (isMobileViewport() && state.isVisible) {
      setSheetVisibility(true);
      refreshLayout(false);
    } else {
      setSheetVisibility(false);
    }
  }

  const onResize = () => {
    if (!isMobileViewport() || !state.isVisible) return;
    refreshLayout(false);
  };

  window.addEventListener('resize', onResize);
  if (window.visualViewport) window.visualViewport.addEventListener('resize', onResize);

  if (MOBILE_SHEET_MEDIA_QUERY.addEventListener) {
    MOBILE_SHEET_MEDIA_QUERY.addEventListener('change', applyViewportMode);
  } else if (MOBILE_SHEET_MEDIA_QUERY.addListener) {
    MOBILE_SHEET_MEDIA_QUERY.addListener(applyViewportMode);
  }

  applyViewportMode();

  return {
    show(defaultSnap = 'mid') {
      state.isVisible = true;
      if (!isMobileViewport()) return;
      setSheetVisibility(true);
      refreshLayout(false);
      setSnap(defaultSnap, true);
    },
    hide() {
      state.isVisible = false;
      setSheetVisibility(false);
    },
    snapTo(snapName = 'mid', animate = true) {
      if (!isMobileViewport()) return;
      if (!state.isVisible) {
        state.isVisible = true;
        setSheetVisibility(true);
        refreshLayout(false);
      }
      setSnap(snapName, animate);
    },
  };
}

function createMobileSheetController() {
  return createDraggableSheetController({
    sheetId: 'mobile-sheet',
    handleSelector: '#sheet-handle-toggle',
    contentSelector: '.sheet-content',
    translateVar: '--sheet-translate-y',
    initialVisible: true,
    collapsedVisible: 26,
    midRatio: 0.56,
    minMidVisible: 220,
  });
}

function createMobileDirSheetController() {
  return createDraggableSheetController({
    sheetId: 'mobile-dir-sheet',
    handleSelector: '.mobile-dir-handle',

    initialVisible: false,

    midRatio: 0.58,
    minMidVisible: 240,
    getMidRatio: sheet => sheet.classList.contains('has-route') ? 0.64 : 0.58,
  });
}

document.addEventListener('DOMContentLoaded', () => {

  mobileDirSheetController = createMobileDirSheetController();
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function formatDist(meters) {
  return meters >= 1000 ? (meters / 1000).toFixed(1) + ' km' : Math.round(meters) + ' m';
}

function formatDuration(seconds) {
  const m = Math.round(seconds / 60);
  return m < 60 ? m + ' min' : Math.floor(m / 60) + 'h ' + (m % 60) + 'min';
}
